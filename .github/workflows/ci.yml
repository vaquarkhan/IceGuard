name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests --cov=iceguard --cov-report=term-missing -q -m "not aws"
      - name: Validation script
        run: python validation/run_all.py
      - name: Benchmark checkpoint overhead
        run: python benchmarks/checkpoint_overhead.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
