name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: iceguard PyPI version to install in the image
        required: true
        default: "1.0.0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/vaquarkhan/iceguard

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            ICEGUARD_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Image summary
        run: |
          echo "## Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull: \`docker pull ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
